name: GusKernel A14-5.15 Pure Manual Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm python3 curl git zip
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Repo Init & Sync
        run: |
          mkdir kernel-workspace && cd kernel-workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-5.15 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --force-sync

      - name: Setup Features (KSU, SUSFS, BBG)
        run: |
          cd kernel-workspace
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          
          # Gunakan symlink atau copy (Manual build tidak sensitif symlink)
          ln -sf $(pwd)/KernelSU $(pwd)/common/drivers/kernelsu
          
          # Patch SUSFS
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-5.15 susfs_src
          cp -r susfs_src/kernel_patches/fs/* common/fs/
          cp -r susfs_src/kernel_patches/include/linux/* common/include/linux/
          cd common
          patch -p1 --fuzz=3 < ../susfs_src/kernel_patches/50_add_susfs_in_gki-android14-5.15.patch || true
          
          # Integrasi Kconfig
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          echo 'obj-y += kernelsu/' >> drivers/Makefile
          
          # Baseband Guard
          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: Configure GKI Defconfig
        run: |
          cd kernel-workspace/common
          cat <<EOF >> arch/arm64/configs/gki_defconfig
          CONFIG_LOCALVERSION="-GusKernel"
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_BBR=y
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_SUSFS=y
          CONFIG_BBG=y
          EOF

      - name: Build Kernel (Manual Make)
        run: |
          cd kernel-workspace
          # Deteksi folder clang secara otomatis
          CLANG_DIR=$(ls -d $(pwd)/prebuilts/clang/host/linux-x86/clang-*)
          export PATH="$CLANG_DIR/bin:$(pwd)/prebuilts/kernel-build-tools/linux-x86/bin:$PATH"
          
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          
          cd common
          # Buat output folder
          mkdir -p ../out
          
          # 1. Buat config
          make O=../out ARCH=arm64 vendor/gki_defconfig
          
          # 2. Build Image
          make -j$(nproc --all) O=../out \
               ARCH=arm64 \
               LLVM=1 \
               LLVM_IAS=1 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
               Image

      - name: Packaging
        run: |
          # Di build manual, Image biasanya ada di out/arch/arm64/boot/
          IMAGE_PATH=$(find kernel-workspace/out -name Image -type f | head -n 1)
          if [ -f "$IMAGE_PATH" ]; then
            git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0 AnyKernel3
            cp "$IMAGE_PATH" AnyKernel3/Image
            cd AnyKernel3
            zip -r9 "../GusKernel-Final.zip" *
          else
            echo "Build gagal: Image tidak ditemukan!" && exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GusKernel-Manual-Final
          path: GusKernel-Final.zip
